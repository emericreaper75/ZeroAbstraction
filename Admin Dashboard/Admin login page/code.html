<body class="bg-primary-container text-on-background font-body min-h-screen overflow-hidden selection:bg-surface-variant selection:text-primary">
<!-- Top Navigation (Suppressed per logic: linear transactional intent) -->
<!-- Removed TopAppBar because this is a login screen -->
<main class="w-full h-screen flex flex-row relative overflow-hidden">
<!-- Ambient Glow -->
<div class="absolute inset-0 glow-overlay pointer-events-none z-0"></div>
<!-- Left Section: Brand Canvas (60%) -->
<div class="w-[60%] h-full flex items-center justify-center bg-[#0a0a0a] relative z-10 p-12">
<h1 class="font-display font-bold text-6xl tracking-tighter text-zinc-300">
                ZeroAbstraction
            </h1>
</div>
<!-- Right Section: Login Panel (40%) -->
<div class="w-[40%] h-full bg-[#111111] flex items-center justify-center relative z-10 border-l border-zinc-700/50">
<div class="w-full max-w-md p-12 transition-all duration-500 ease-out transform translate-y-0 scale-100 opacity-100">
<div class="mb-12">
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Admin Access</span>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label text-xs text-on-surface-variant" for="email">Email</label>
<div class="relative group input-glow rounded-DEFAULT transition-all duration-200">
<input class="w-full bg-surface-container-low border border-zinc-700/50 rounded-DEFAULT px-4 py-3 text-on-surface placeholder:text-outline-variant focus:border-zinc-300 focus:ring-0 transition-all duration-200 font-body text-sm" id="email" name="email" placeholder="sysadmin@zeroabstraction.dev" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-xs text-on-surface-variant" for="password">Password</label>
<div class="relative group input-glow rounded-DEFAULT transition-all duration-200">
<input class="w-full bg-surface-container-low border border-zinc-700/50 rounded-DEFAULT px-4 py-3 text-on-surface placeholder:text-outline-variant focus:border-zinc-300 focus:ring-0 transition-all duration-200 font-body text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-zinc-300 hover:bg-zinc-200 text-[#0a0a0a] font-body font-medium text-sm px-6 py-4 rounded-DEFAULT transition-all duration-200 hover:-translate-y-[1px]" type="submit">
                            Initialize Session
                        </button>
</div>
</form>
</div>
